on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to test release for'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Extract changelog section for tag
        id: extract
        env:
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          import sys

          raw_tag = os.environ["RAW_TAG"].removeprefix("refs/tags/")
          version = raw_tag[1:] if raw_tag.startswith("v") else raw_tag
          heading = f"## [{version}]"
          print(f"Looking for changelog section for tag: {raw_tag} ({version})")

          lines = Path("CHANGELOG.md").read_text(encoding="utf-8").splitlines()
          try:
              start = lines.index(heading) + 1
          except ValueError:
              print(f"CHANGELOG.md does not contain release heading {heading}", file=sys.stderr)
              sys.exit(1)

          end = next((idx for idx in range(start, len(lines)) if lines[idx].startswith("## [")), len(lines))
          release_date_re = re.compile(r"- \d{4}-\d{2}-\d{2}")
          notes = [
              line
              for line in lines[start:end]
              if line != "### Released" and not release_date_re.fullmatch(line)
          ]

          while notes and not notes[0].strip():
              notes.pop(0)
          while notes and not notes[-1].strip():
              notes.pop()

          if not any(line.strip() for line in notes):
              print(f"Release heading exists, but extracted notes are empty for {version}", file=sys.stderr)
              sys.exit(1)

          Path("release_notes.md").write_text("\n".join(notes) + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RAW_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          TAG="${RAW_TAG#refs/tags/}"
          gh release create "$TAG" \
            --title "Release $TAG" \
            --notes-file release_notes.md
